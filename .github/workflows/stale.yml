name: 'Close stale issues'
on:
  schedule:
    # Run at 1:30 AM every Monday, Wednesday, and Friday
    - cron: '30 1 * * 1,3,5'

permissions: {}

jobs:
  stale:
    permissions:
      contents: read
      pull-requests: write
      issues: write
    uses: cpp-linter/.github/.github/workflows/stale.yml@main
